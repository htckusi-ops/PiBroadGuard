# PiBroadGuard – Default Rules v1.0
# Regelwerk für Broadcast Device Security Assessment

- rule_key: telnet_open
  title: "Telnet aktiv (Port 23)"
  description: "Telnet überträgt alle Daten inkl. Credentials im Klartext."
  condition:
    type: port_open
    port: 23
  severity: high
  broadcast_context: "Bei Broadcast-Geräten gelegentlich betriebsnotwendig – Kompensation prüfen"
  recommendation: "Deaktivieren oder auf Management-VLAN mit ACL beschränken"
  ask_compensation: true
  affects_score: technical

- rule_key: ftp_open
  title: "FTP aktiv (Port 21)"
  description: "FTP überträgt Daten und Credentials unverschlüsselt."
  condition:
    type: port_open
    port: 21
  severity: high
  broadcast_context: "Teils für Firmware-Updates genutzt – Alternativprozess prüfen"
  recommendation: "Deaktivieren oder auf SFTP migrieren"
  ask_compensation: true
  affects_score: technical

- rule_key: http_no_https
  title: "HTTP ohne HTTPS verfügbar"
  description: "Unverschlüsseltes Web-Interface ermöglicht Credential-Sniffing."
  condition:
    type: port_open
    port: 80
  severity: medium
  broadcast_context: "Management-Interface unverschlüsselt – kritisch bei Credentials-Übertragung"
  recommendation: "HTTPS aktivieren oder HTTP deaktivieren; bei Nicht-Härtbarkeit: Management-VLAN"
  ask_compensation: true
  affects_score: technical

- rule_key: snmp_v1_v2
  title: "SNMP v1/v2c aktiv (Port 161 UDP)"
  description: "SNMP v1/v2c verwendet schwache Community-String-Authentifizierung."
  condition:
    type: port_open
    port: 161
    protocol: udp
  severity: medium
  broadcast_context: "SNMP v1/v2c häufig in Broadcast-Monitoring – Community String prüfen"
  recommendation: "SNMPv3 bevorzugen; falls nicht möglich: Read-only Community, IP-ACL"
  ask_compensation: true
  affects_score: technical

- rule_key: ssh_open
  title: "SSH aktiv (Port 22)"
  description: "SSH ist grundsätzlich sicher, aber Version und Auth-Methode sollten geprüft werden."
  condition:
    type: port_open
    port: 22
  severity: info
  broadcast_context: "SSH ist grundsätzlich akzeptabel – Version und Auth-Methode prüfen"
  recommendation: "Sicherstellen: SSHv2, keine Root-Logins, keine Passwort-Auth falls möglich"
  ask_compensation: false
  affects_score: technical

- rule_key: smb_open
  title: "SMB aktiv (Port 445)"
  description: "SMB auf Broadcast-Geräten ist ungewöhnlich und kann auf unnötige Dienste hinweisen."
  condition:
    type: port_open
    port: 445
  severity: high
  broadcast_context: "SMB auf Broadcast-Geräten ungewöhnlich – Notwendigkeit klären"
  recommendation: "Deaktivieren falls nicht betriebsnotwendig; SMBv1 zwingend deaktivieren"
  ask_compensation: true
  affects_score: technical

- rule_key: rdp_open
  title: "RDP aktiv (Port 3389)"
  description: "RDP-Zugang erhöht die Angriffsfläche erheblich."
  condition:
    type: port_open
    port: 3389
  severity: high
  broadcast_context: "Fernwartung via RDP – Netzwerkzugang prüfen"
  recommendation: "Auf Management-VLAN beschränken; NLA erzwingen; MFA prüfen"
  ask_compensation: true
  affects_score: technical

- rule_key: modbus_open
  title: "Modbus/TCP aktiv (Port 502)"
  description: "Modbus/TCP hat keine Authentifizierung und ermöglicht direkte Steuerung."
  condition:
    type: port_open
    port: 502
  severity: high
  broadcast_context: "Industrial-Protokoll auf Broadcast-Geräten – Netzwerksegmentierung kritisch"
  recommendation: "Streng auf notwendige Clients beschränken; Firewall-Regeln prüfen"
  ask_compensation: true
  affects_score: technical

- rule_key: rtsp_open
  title: "RTSP aktiv (Port 554)"
  description: "RTSP-Zugang kann unkontrollierten Zugriff auf Audio-/Videostreams ermöglichen."
  condition:
    type: port_open
    port: 554
  severity: medium
  broadcast_context: "RTSP für Broadcast-Streaming häufig notwendig – Zugangskontrolle prüfen"
  recommendation: "Authentifizierung aktivieren; Zugriff auf autorisierte Clients beschränken"
  ask_compensation: true
  affects_score: technical

- rule_key: no_lifecycle_info
  title: "Kein dokumentierter Lifecycle / EOL-Datum"
  description: "Ohne dokumentiertes EOL-Datum ist langfristige Security-Planung nicht möglich."
  condition:
    type: manual_answer
    question_key: lifecycle_documented
    answer: "no"
  severity: medium
  broadcast_context: "Langfristiger Betrieb ohne Sicherheitsgarantie – Risikoakzeptanz dokumentieren"
  recommendation: "Hersteller anfragen; befristete Einsatzgenehmigung mit Nachfolgerplanung"
  ask_compensation: false
  affects_score: lifecycle

- rule_key: no_security_updates
  title: "Keine separaten Security-Updates verfügbar"
  description: "Sicherheitslücken können nur durch aufwändige Firmware-Upgrades behoben werden."
  condition:
    type: manual_answer
    question_key: security_updates_available
    answer: "no"
  severity: medium
  broadcast_context: "Sicherheitslücken nur via Firmware-Upgrade behebbar – Aufwand erhöht"
  recommendation: "Update-Aufwand in Betriebsplanung einbeziehen; Monitoring verstärken"
  ask_compensation: false
  affects_score: lifecycle

- rule_key: default_credentials
  title: "Default-Credentials vorhanden und nicht änderbar"
  description: "Nicht änderbare Default-Passwörter sind ein kritisches Sicherheitsrisiko."
  condition:
    type: manual_answer
    question_key: default_creds_changeable
    answer: "no"
  severity: critical
  broadcast_context: "Bekannte Default-Passwörter bei Broadcast-Geräten weit verbreitet"
  recommendation: "Gerät nur in vollständig isoliertem Segment betreiben; Freigabe nur mit starker Kompensation"
  ask_compensation: true
  affects_score: technical

- rule_key: no_syslog
  title: "Kein Syslog-Export möglich"
  description: "Ohne Syslog sind Security-Events nicht zentral auswertbar."
  condition:
    type: manual_answer
    question_key: syslog_supported
    answer: "no"
  severity: low
  broadcast_context: "Eingeschränkte Detection-Fähigkeit – kompensierendes Netzwerk-Monitoring prüfen"
  recommendation: "Netzwerkbasiertes Logging als Kompensation (Netflow, IDS)"
  ask_compensation: false
  affects_score: operational

- rule_key: no_psirt
  title: "Kein PSIRT / Security-Kontakt beim Hersteller"
  description: "Ohne PSIRT ist keine strukturierte Sicherheitskommunikation mit dem Hersteller möglich."
  condition:
    type: manual_answer
    question_key: psirt_available
    answer: "no"
  severity: low
  broadcast_context: "Sicherheitsmeldungen nicht strukturiert möglich – erhöhtes Reaktionsrisiko"
  recommendation: "Allgemeinen Support-Kanal dokumentieren; externe Quellen (NVD, CERT) überwachen"
  ask_compensation: false
  affects_score: vendor

- rule_key: no_hardening_guide
  title: "Kein Hardening-Guide vom Hersteller verfügbar"
  description: "Ohne Hardening-Guide ist sichere Konfiguration erschwert."
  condition:
    type: manual_answer
    question_key: hardening_guide_available
    answer: "no"
  severity: low
  broadcast_context: "Eigenständige Härtung ohne Herstellerunterstützung notwendig"
  recommendation: "CIS Benchmarks oder interne Hardening-Richtlinien als Grundlage verwenden"
  ask_compensation: false
  affects_score: vendor

- rule_key: no_mfa
  title: "Keine MFA-Unterstützung"
  description: "Ohne MFA besteht erhöhtes Risiko durch gestohlene Credentials."
  condition:
    type: manual_answer
    question_key: mfa_possible
    answer: "no"
  severity: low
  broadcast_context: "MFA auf Broadcast-Geräten selten verfügbar – Netzwerksegmentierung als Kompensation"
  recommendation: "Netzwerkbasierte Zugangskontrolle als Kompensation; Jump-Host verwenden"
  ask_compensation: true
  affects_score: technical

# ─── NMOS / IP-Broadcast-Dienste ──────────────────────────────────────────────

- rule_key: nmos_http_open
  title: "NMOS IS-04 Registry ohne TLS (Port 8080)"
  description: "Eine NMOS IS-04 Registry auf Port 8080 (HTTP) ist unverschlüsselt erreichbar. Nodes registrieren sich und tauschen Konfigurationsdaten ohne Vertraulichkeitsschutz aus."
  condition:
    type: port_open
    port: 8080
  severity: medium
  broadcast_context: "Häufig in Legacy-NMOS-Setups ohne BCP-003-01 TLS – direkte Verbindung von Nodes zur Registry unverschlüsselt"
  recommendation: "NMOS Registry auf HTTPS (Port 8443) migrieren; BCP-003-01 TLS implementieren. Tiefergehende TLS-Qualitätsprüfung (Cipher Suites, Zertifikat-Chain) erfordert das AMWA nmos-testing Tool (BCP-003-01 Test Suite) in einer isolierten Testumgebung."
  ask_compensation: true
  affects_score: technical

- rule_key: ptp_event_open
  title: "PTP Event Port offen (UDP 319)"
  description: "PTP/IEEE 1588 Event-Messages (Sync, Delay_Req) sind von aussen erreichbar. Ein Angreifer im gleichen Segment kann Timing-Angriffe durchführen (Rogue Grandmaster)."
  condition:
    type: port_open
    port: 319
    protocol: udp
  severity: medium
  broadcast_context: "ST 2059/SMPTE: PTP-Timing ist kritisch für Live-Produktion. Ein Rogue-Grandmaster kann Bild-/Ton-Synchronisation im gesamten Studio zerstören."
  recommendation: "PTP-Traffic auf dediziertes Timing-VLAN beschränken; IGMP-Snooping aktivieren; PTP-Domain validieren. Prüfen ob Gerät als Grandmaster auftreten kann (manuell via 'Manuelle Fragen → PTP/Timing')."
  ask_compensation: true
  affects_score: technical

- rule_key: ptp_general_open
  title: "PTP General Port offen (UDP 320)"
  description: "PTP/IEEE 1588 General-Messages (Announce, Follow_Up) sind von aussen erreichbar. Ermöglicht Grandmaster-Manipulation und Timing-Unterbrechung."
  condition:
    type: port_open
    port: 320
    protocol: udp
  severity: medium
  broadcast_context: "ST 2059: Announce-Messages bestimmen den Grandmaster. Unautorisierte Announce-Messages können das gesamte Timing-Netz destabilisieren."
  recommendation: "PTP auf isoliertes Timing-VLAN beschränken; Boundary-Clock-Rollen dokumentieren und absichern."
  ask_compensation: true
  affects_score: technical

- rule_key: ssdp_open
  title: "SSDP/UPnP aktiv (UDP 1900)"
  description: "SSDP (Simple Service Discovery Protocol) sendet Device-Discovery-Broadcasts und gibt Geräteinformationen preis. UPnP-Dienste können unerwartete Ports öffnen."
  condition:
    type: port_open
    port: 1900
    protocol: udp
  severity: low
  broadcast_context: "Auf Broadcast-Geräten meist nicht betriebsnotwendig – erhöht Angriffsfläche und gibt Infrastrukturinformationen preis (EBU R143 §4.2)"
  recommendation: "SSDP/UPnP deaktivieren falls nicht für Geräte-Discovery benötigt. Discovery via NMOS IS-04 bevorzugen."
  ask_compensation: false
  affects_score: technical

- rule_key: mdns_open
  title: "mDNS/DNS-SD aktiv (UDP 5353)"
  description: "mDNS (Multicast DNS) und DNS-SD (DNS Service Discovery) geben Gerät- und Dienstinformationen im lokalen Segment bekannt."
  condition:
    type: port_open
    port: 5353
    protocol: udp
  severity: info
  broadcast_context: "mDNS wird von NMOS IS-04 und einigen NMOS-Registries genutzt (JT-NM TR-1001-1). Prüfen ob Discovery auf Management-VLAN beschränkt ist."
  recommendation: "mDNS-Traffic auf Management-VLAN beschränken; sicherstellen dass Media-VLAN keine Discovery-Broadcasts erhält."
  ask_compensation: false
  affects_score: technical

- rule_key: wsd_open
  title: "WS-Discovery aktiv (TCP 5357)"
  description: "WS-Discovery (Web Services Dynamic Discovery) gibt Gerät- und Dienstinformationen preis und ist ein typisches Windows/IT-Protokoll auf Broadcast-Geräten."
  condition:
    type: port_open
    port: 5357
  severity: low
  broadcast_context: "WSD auf Broadcast-Geräten ungewöhnlich – deutet auf Windows-basierte Geräte oder unnötige Dienste hin (EBU R143 §4.2)"
  recommendation: "Deaktivieren falls kein betriebsnotwendiger Einsatz; überprüfen ob WSD durch Firewall-Regel einschränkbar."
  ask_compensation: false
  affects_score: technical

- rule_key: bacnet_open
  title: "BACnet aktiv (UDP 47808)"
  description: "BACnet ist ein Gebäudeautomations-Protokoll ohne Authentifizierung. Auf Broadcast-Geräten ist BACnet äusserst ungewöhnlich und deutet auf Fehlkonfiguration oder unerwartete Dienste hin."
  condition:
    type: port_open
    port: 47808
    protocol: udp
  severity: high
  broadcast_context: "BACnet auf Broadcast-Equipment ist ein starker Indikator für fehlkonfigurierte oder kompromittierte Geräte (IEC 62443)"
  recommendation: "Sofort deaktivieren. Prüfen ob das Gerät in einem geteilten Netz betrieben wird. BACnet-Dienste bieten keine Authentifizierung und ermöglichen direkte Gerätekontrolle."
  ask_compensation: true
  affects_score: technical

- rule_key: ptp_grandmaster_risk
  title: "Gerät kann als PTP Grandmaster auftreten"
  description: "Ein Gerät, das als PTP Grandmaster auftreten kann ohne entsprechende Schutzmassnahmen, stellt ein kritisches Timing-Risiko dar (Rogue Grandmaster Attack)."
  condition:
    type: manual_answer
    question_key: ptp_can_be_grandmaster
    answer: "yes"
  severity: high
  broadcast_context: "Ein Rogue PTP Grandmaster kann die Synchronisation des gesamten Studios zerstören – Bild-/Ton-Ausfall in der Live-Produktion. Kritischer als in klassischer IT-Umgebung."
  recommendation: "PTP-Domain-Nummer fixieren; Best-Master-Clock-Algorithmus (BMCA) sichern; PTP auf dediziertes VLAN isolieren; unerwünschte Grandmaster-Ankündigungen via Switch-ACL blockieren. Referenz: SMPTE ST 2059, JT-NM TR-1001-1."
  ask_compensation: true
  affects_score: technical

- rule_key: mgmt_media_not_separated
  title: "Management- und Media-Netz nicht getrennt"
  description: "Management-Zugang und Media-Daten laufen über dasselbe Netzwerk-Interface oder VLAN. Ein Angreifer mit Zugriff auf das Media-Netz kann direkt Geräte administrieren."
  condition:
    type: manual_answer
    question_key: mgmt_media_separated
    answer: "no"
  severity: high
  broadcast_context: "In Broadcast-Produktionsumgebungen ist die Trennung von Media-Traffic und Management-Traffic fundamentale Anforderung (EBU R143, IEC 62443-3-2 Zonenmodell)"
  recommendation: "Management-Interface in separates VLAN/Segment verlegen; ACL für Management-Zugriff auf autorisierte Hosts beschränken. Langfristig: Out-of-Band Management anstreben."
  ask_compensation: true
  affects_score: operational
